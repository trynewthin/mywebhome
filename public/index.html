<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="MyWebHome — AI 驱动的模块化个人 Web 平台">
    <title>MyWebHome</title>

    <!-- PWA Meta -->
    <meta name="theme-color" content="#060606">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MyWebHome">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="MyWebHome">
    <meta name="msapplication-TileColor" content="#060606">

    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Syne:wght@400;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/theme-light.css">
</head>

<body>
    <div id="app">
        <!-- Shell 由 JS 渲染 -->
        <div class="loading-screen">
            <div class="loading-spinner"></div>
            <p>加载中...</p>
        </div>
    </div>

    <script type="module" src="/js/api.js"></script>
    <script type="module" src="/js/components.js"></script>
    <script type="module" src="/js/router.js"></script>
    <script type="module" src="/js/app.js"></script>

    <!-- Service Worker 注册 -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(() => { });
        }
    </script>
</body>

</html>
